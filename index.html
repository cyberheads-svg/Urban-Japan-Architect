<!DOCTYPE html>
<html lang="ja" style="background:#0c0b0e">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Japan Architect v3.7</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');
  :root{
    --bg:#0c0b0e;--panel:#131118;--border:#22202a;--border2:#332f40;
    --text:#d4cee0;--muted:#6a6278;--dim:#2a2535;
    --spring:#f9a8d4;--summer:#86efac;--autumn:#fcd34d;--winter:#93c5fd;
    --accent:#c084fc;--mono:'DM Mono',monospace;--serif:'DM Serif Display',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px}
  header{text-align:center;margin-bottom:32px}
  .eyebrow{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  h1{font-family:var(--serif);font-style:italic;font-size:clamp(28px,5vw,46px);color:#fff;font-weight:400;line-height:1.1;margin-bottom:4px}
  h1 span{color:var(--accent)}
  .subtitle{font-size:11px;color:var(--muted);margin-top:6px;letter-spacing:.15em}
  .counter{font-size:10px;color:var(--dim);margin-top:8px;letter-spacing:.2em}
  
  .selector-group{width:100%;max-width:680px;margin-bottom:16px}
  .selector-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .selector{display:flex;gap:8px;width:100%;flex-wrap:wrap}
  .selector-btn{flex:1;min-width:120px;padding:11px 0;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  
  /* Season Active States */
  .selector-btn.active-spring{border-color:var(--spring);color:var(--spring);background:#1a0f14}
  .selector-btn.active-summer{border-color:var(--summer);color:var(--summer);background:#0f1a12}
  .selector-btn.active-autumn{border-color:var(--autumn);color:var(--autumn);background:#1a1710}
  .selector-btn.active-winter{border-color:var(--winter);color:var(--winter);background:#0f1218}
  
  /* Generic Active State */
  .active{border-color:var(--accent)!important;color:var(--accent)!important;background:#16101a}

  .boost-panel{width:100%;max-width:680px;background:#0f0e12;border:1px solid var(--border);padding:20px;margin-bottom:20px}
  .card{width:100%;max-width:680px;background:var(--panel);border:1px solid var(--border);padding:32px;margin-bottom:20px}
  .field-row{display:grid;grid-template-columns:110px 1fr auto;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid var(--border)}
  .field-label{font-size:9px;color:var(--muted);text-transform:uppercase}
  .field-value{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.4}

  .prompt-textarea{width:100%;background:#0a080c;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:11px;line-height:1.7;padding:12px;min-height:100px;word-break:break-word;cursor:pointer}
  .generate-btn{width:100%;max-width:680px;background:var(--accent);color:#000;font-weight:700;border:none;padding:20px;font-size:12px;letter-spacing:0.4em;text-transform:uppercase;cursor:pointer}
  
  footer{margin-top:20px;font-size:9px;color:var(--dim);text-align:center;letter-spacing:0.2em}
</style>
</head>
<body>

<header>
  <div class="eyebrow">AI Snapshot Suite · Female Edition</div>
  <h1>Urban Japan <span>Architect</span></h1>
  <div class="subtitle">136 Tops · 74 Locations · 20 Bottoms</div>
  <div class="counter" id="counter">— generated</div>
</header>

<div class="selector-group">
  <div class="selector">
    <button class="selector-btn active-spring" data-season="spring" onclick="setSeason('spring')">🌸 Spring</button>
    <button class="selector-btn" data-season="summer" onclick="setSeason('summer')">☀️ Summer</button>
    <button class="selector-btn" data-season="autumn" onclick="setSeason('autumn')">🍂 Autumn</button>
    <button class="selector-btn" data-season="winter" onclick="setSeason('winter')">❄️ Winter</button>
  </div>
</div>

<div class="boost-panel">
  <div class="selector-group">
    <div class="selector-label">Scene Type <span>情景種別</span></div>
    <div class="selector">
      <button class="selector-btn scene-btn active" onclick="setSceneType('urban')" id="scene-urban">Urban (City)</button>
      <button class="selector-btn scene-btn" onclick="setSceneType('room')" id="scene-room">Private (Room)</button>
    </div>
  </div>

  <div class="selector-group" style="margin-top:12px">
    <div class="selector-label">Style Filter <span>質感フィルタ</span></div>
    <div class="selector">
      <button class="selector-btn filter-btn active" onclick="setFilter('none')" id="filter-none">None</button>
      <button class="selector-btn filter-btn" onclick="setFilter('raw')" id="filter-raw">Raw Street</button>
      <button class="selector-btn filter-btn" onclick="setFilter('cine')" id="filter-cine">Cinematic</button>
    </div>
  </div>
</div>

<div class="card">
  <div id="emptyState" style="text-align:center;padding:40px 0;color:var(--dim);font-size:12px;">SNAPSHOT ARCHITECT ENGINE v3.7</div>
  <div id="displayFields" class="fields" style="display:none"></div>
  <div id="promptBox" style="display:none;margin-top:20px">
    <textarea class="prompt-textarea" id="finalPrompt" readonly onclick="this.select()"></textarea>
  </div>
</div>

<button class="generate-btn" onclick="generateAll()">GENERATE SNAPSHOT</button>

<script>
let currentSeason = "spring";
let currentSceneType = "urban";
let currentFilter = "none";
let generated = 0;
let lastVals = {};

const pick = arr => arr[Math.floor(Math.random() * arr.length)];

// ==================== DATA: ALL TOPS (136) ====================
const ALL_TOPS = [
  "oversized rigid graphic tee","heavyweight loopwheel cotton hoodie","technical nylon multi-pocket vest","crisp structured button-down shirt","asymmetrical cropped knit",
  "highly detailed abstract print shirt","voluminous multi-layered ruffle blouse","large intricate floral pattern jacket","complex tie-dye washed hoodie","embroidered vintage tapestry vest",
  "sequined tube top","satin bustier with skin-tight fit","plunge satin camisole lace trim","cropped lace-up corset top","faux leather bralette under sheer mesh",
  "black lace high-neck top","oversized black hoodie with heavy distressed text","gothic collar blouse with complex frills","bandage wrap crop top","torn and safety-pinned layered tee",
  "pastel sailor uniform blouse","soft cable-knit sweater with heart embroidery","strawberry pattern complex frill top","cloud and star print oversized tee","voluminous puff-sleeve floral blouse",
  "boxy denim trucker jacket","pinstripe tailored blazer","minimalist turtleneck base layer","vintage sports jersey","sheer organza bomber",
  "boiled wool cardigan","hand-painted silk shirt","utilitarian field jacket","reflective silver windbreaker","crushed velvet camisole",
  "open-back ribbed knit","asymmetric leather corset","distressed thermal waffle top","puffy sleeve cropped jacket","mesh panelled tech top",
  "rugby stripe polo","satin varsity jacket","sculptural neoprene top","layered chiffon tank","pvc transparent raincoat",
  "traditional haori-style modern jacket","embroidered souvenir jacket (sukajan)","fleece quarter-zip pullover","shrunk-fit baby tee","tulle-overlay corset",
  "sleeveless high-neck bodysuit","wrapped linen tunic","deconstructed trench-top","military surplus olive shirt","rhinestone-encrusted denim top",
  "liquid-look metallic top","off-the-shoulder balloon sleeve","hand-knit mohair sweater","utility tactical chest rig","cut-out shoulder jersey",
  "cowl neck satin blouse","fringed suede vest","corset-style denim bustier","striped sailor sweater","asymmetric wrapped kimono shirt",
  "heavy canvas work shirt","semi-transparent lace bodysuit","layered mesh racing jersey","vintage rock band tee","quilted liner jacket",
  "corset-laced hoodie","boxy flannel shirt","oversized wool poncho","leather-look biker vest","double-collared office shirt",
  "sheer floral turtleneck","heavyweight waffle knit hoodie","ribbed halter neck","square-neck milkmaid blouse","technical popover anorak",
  "distressed mohair cardigan","puff-print streetwear hoodie","lace-up side tee","velour track jacket","minimalist silk slip top",
  "button-up corduroy shirt","asymmetric hem tunic","structured peplum top","sheer butterfly wing blouse","double-breasted short jacket",
  "sleeveless turtleneck shell","raw edge canvas vest","draped jersey top","patchwork bandanna shirt","monochrome camo jacket","eyelet lace peasant blouse",
  "sheer mesh over bralette","cardigan draped over shoulders","shirt layered under sweater vest","lace camisole over basic tee","oversized hoodie under denim jacket","transparent organza over crop top","double-layered tank top","turtleneck under open button-down","mesh long-sleeve under graphic tee","corset belt over oversized shirt",
  "distressed oversized tee","ripped knit with safety pins","frayed hem crop top","bleach-stained vintage sweatshirt","shredded denim vest","worn-out thermal top","mended waffle knit","acid-wash tee with holes","tattered edge oversized hoodie","distressed flannel with patched elbows",
  "liquid metallic camisole","patent vinyl bustier","iridescent organza blouse","sequined tube top","satin corset top","glossy nylon puffer","reflective silver windbreaker","silk slip top with sheen","holographic crop jacket","shimmering velvet cami",
  "chunky cable knit oversized","fine ribbed turtleneck","crochet open-weave top","mohair fuzzy sweater","waffle texture thermal","pointelle knit delicate blouse","loose gauge distressed knit","ribbed tank in thick cotton","hand-knit wool cardigan","argyle pattern sweater"
];

// ==================== DATA: BOTTOMS (20) ====================
const ALL_BOTTOMS = [
  "wide-leg tailored slacks","parachute pants with drawstring","raw Okayama selvage denim","technical cargo pants","leather-look micro mini skirt","asymmetrical pleated midi","distressed denim shorts","tartan check skirt",
  "high-waisted cigarette pants","velvet flared trousers","ripstop nylon joggers","layered chiffon skirt","utility bermuda shorts","pinstripe wool slacks","vintage leather trousers","acid-wash skinny jeans","metallic pleated skirt","thermal leggings with leg warmers","patchwork carpenter pants","linen culottes"
];

// ==================== DATA: LOCATIONS (74) ====================
const LOC_URBAN = [
  "narrow asphalt backstreet with tangled overhead power lines","multistory bicycle parking with thousands of silver spokes","coin parking lot with yellow wheel stoppers","residential street with utility poles","concrete overpass underside with pigeons","elevated highway overpass with massive concrete pillars","train station platform edge with yellow tactile paving","narrow gap between office buildings","Nakameguro-style riverside with branches overhead","izakaya alley, red paper lanterns","konbini parking lot, cold white fluorescent","pachinko parlor exterior, aggressive signage","vending machine corner in a quiet dark alley","coin laundry interior, rows of dryers humming","narrow residential alley with bicycles parked haphazardly","concrete staircase of old apartment building, rusted handrail","underneath railway bridge, graffiti and pigeon feathers","rooftop with drying laundry and satellite dishes","back entrance of building, delivery bikes and trash area","narrow gap between convenience store and apartment, vending machines","elevator lobby of old mixed-use building, dim fluorescent","underground bicycle parking, concrete and echo","fire escape stairs on building exterior, evening light","deserted playground at night","abandoned gas station under neon","shutter-closed traditional shopping street","crowded Shibuya crossing bokeh","pedestrian bridge over main road","wet asphalt alley with neon reflections","industrial harbor area","park bench under a single streetlamp","narrow stone-paved slope in old Tokyo","modernist glass building entrance","metro station ticket gates","busy bus stop under rain","sloped road with city view","construction site with blue tarps","canal side walk with iron railings","elevated train track shadow","rooftop helipad area","small shrine squeezed between skyscrapers","public phone booth in the rain","vending machine row at a bus terminal","empty parking tower","narrow tunnel for pedestrians","overlooking a massive rail yard","terrace of a high-rise building","spiral staircase of a fashion mall","backstage of a small live house","graffiti-covered skate park","canal bridge with stone pillars","quiet suburban train crossing","hillside residential area with stairs","riverbank with long grass"
];

const LOC_ROOM = [
  "small one-room apartment, futon folded, clothes rack overflowing","bedroom with unmade bed, morning light through cheap curtains","tiny kitchen with dishes in sink, refrigerator covered in magnets","desk corner with laptop open, coffee cup rings on wood","bathroom with small tub, toiletries lined up, steam","closet doorway, clothes spilling out, hangers mixed","living room floor, cushions and low table, TV glow","balcony with potted plants and drying rack, city view beyond","entrance genkan with shoes scattered, umbrella stand","room at night, only desk lamp on, laundry hanging indoors","cluttered vanity mirror with cosmetics","dimly lit hallway of a wooden apartment","morning kitchen, steam from a rice cooker","bedside table with tangled charging cables","piles of fashion magazines on floor","sun-drenched window with dust motes","interior with warm wood and minimalist furniture","small home studio with synth and cables","cozy nook with beanbag and bookshelves","laundry drying on hangers in a cramped room"
];

const RARE_TOKYO = ["abandoned family mart plastic umbrella nearby","pachinko neon bleeding into urban fog","Don Quijote plastic bag hanging from wrist","construction LED flashing magenta","rain-soaked convenience store receipt","blurred taxi tail lights in the bokeh"];

// ==================== LOGIC ====================

function setSeason(s) { currentSeason = s; updateUI(); }
function setSceneType(t) { currentSceneType = t; updateUI(); }
function setFilter(f) { currentFilter = f; updateUI(); }

function updateUI() {
  document.querySelectorAll("[data-season]").forEach(b => {
    b.classList.remove(`active-spring`,`active-summer`,`active-autumn`,`active-winter`);
    if (b.dataset.season === currentSeason) b.classList.add(`active-${currentSeason}`);
  });
  document.querySelectorAll(".scene-btn, .filter-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`scene-${currentSceneType}`).classList.add("active");
  document.getElementById(`filter-${currentFilter}`).classList.add("active");
}

function generateAll() {
  generated++;
  document.getElementById("counter").textContent = `${generated} generated`;
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("displayFields").style.display = "flex";
  document.getElementById("promptBox").style.display = "block";

  const locPool = currentSceneType === 'urban' ? LOC_URBAN : LOC_ROOM;
  
  let filterTags = "";
  if (currentFilter === 'raw') filterTags = "raw street photography, heavy film grain, candid snapshot, slight motion blur, lo-fi aesthetic";
  if (currentFilter === 'cine') filterTags = "cinematic street photography, teal and orange color grade, volumetric lighting, atmospheric depth";

  lastVals = {
    top: pick(ALL_TOPS),
    bottom: pick(ALL_BOTTOMS),
    loc: pick(locPool),
    rare: (Math.random() < 0.3) ? pick(RARE_TOKYO) : null,
    filter: filterTags,
    camera: "Fujifilm X-T4, 23mm f2, high fidelity, 8k"
  };

  const p = [
    `location: ${lastVals.loc}`,
    "young Japanese woman",
    `wearing ${lastVals.top}`,
    lastVals.bottom,
    lastVals.camera,
    lastVals.rare,
    lastVals.filter,
    "Tokyo realism, anonymous street photography aesthetic"
  ].filter(Boolean).join(", ");

  document.getElementById("finalPrompt").value = p;
  renderFields();
}

function renderFields() {
  const v = lastVals;
  document.getElementById("displayFields").innerHTML = `
    <div class="field-row"><div class="field-label">Top</div><div class="field-value" style="color:var(--accent)">${v.top}</div></div>
    <div class="field-row"><div class="field-label">Bottom</div><div class="field-value" style="color:var(--accent)">${v.bottom}</div></div>
    <div class="field-row"><div class="field-label">Scene</div><div class="field-value">${v.loc}</div></div>
    ${v.rare ? `<div class="field-row"><div class="field-label">Rare</div><div class="field-value" style="color:var(--summer)">${v.rare}</div></div>` : ''}
  `;
}
</script>
</body>
</html>
